name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish even if version already on npm'
        type: boolean
        default: false

jobs:
  archgate:
    name: archgate check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify rule scopes
        run: |
          set -e
          grep "scope: 'src/graph/'" arch/rules/graph.rules.ts
          grep "scope: 'wiki/'" arch/rules/wiki.rules.ts
          grep "scope: 'src/serve/'" arch/rules/serve.rules.ts
          grep "scope: 'src/dedup/'" arch/rules/dedup.rules.ts

      - name: Initialize archgate project
        run: pnpm exec archgate init

      - name: Run archgate check
        run: pnpm exec archgate check --ci

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  hook-deployment:
    name: Hook Deployment Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate skill files
        run: pnpm run generate:skills

      - name: Verify generated files
        run: pnpm run generate:skills --check

      - name: Verify hook scripts exist and are valid ESM
        run: |
          cd scripts && node --input-type=module < graphwiki-pretool.mjs && echo "pretool.mjs: valid ESM" && node --input-type=module < graphwiki-session-start.mjs && echo "session-start.mjs: valid ESM" && node --input-type=module < graphwiki-posttool.mjs && echo "posttool.mjs: valid ESM"

      - name: Simulate PreToolUse hook with snake_case event (Read tool)
        run: |
          echo '{"tool_name":"Read","tool_input":{"file_path":"/src/Auth.ts"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Read: OK"

      - name: Simulate PreToolUse hook with snake_case event (Ask tool)
        run: |
          echo '{"tool_name":"Ask","tool_input":{"prompt":"What is authentication?"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Ask: OK"

      - name: Simulate PreToolUse hook with snake_case event (Bash tool - skip)
        run: |
          echo '{"tool_name":"Bash","tool_input":{"command":"ls"},"cwd":".","session_id":"test123"}' | \
          node scripts/graphwiki-pretool.mjs
          echo "PreToolUse Bash: OK"

      - name: Simulate hook installation
        run: |
          mkdir -p /tmp/test-hooks
          echo '{"hooks": {"PreToolUse": [{"matcher": "*", "hooks": [{"type": "command", "command": "echo existing"}]}]}}' > /tmp/test-hooks/hooks.json

          node --import tsx -e "
            import { generateHooksJsonEntries } from './src/hooks/skill-generator.ts';
            const entries = JSON.parse(generateHooksJsonEntries());
            // Verify graphwiki entries have correct structure (matcher + hooks array)
            const hasPreToolUse = entries.PreToolUse?.length > 0 && entries.PreToolUse[0].hooks?.[0]?.command?.includes('graphwiki-pretool');
            const hasSessionStart = entries.SessionStart?.length > 0 && entries.SessionStart[0].hooks?.[0]?.command?.includes('graphwiki-session');
            const hasPostToolUse = entries.PostToolUse?.length > 0 && entries.PostToolUse[0].hooks?.[0]?.command?.includes('graphwiki-posttool');
            console.log('Has PreToolUse entry:', !!hasPreToolUse);
            console.log('Has SessionStart entry:', !!hasSessionStart);
            console.log('Has PostToolUse entry:', !!hasPostToolUse);
            if (!hasPreToolUse || !hasSessionStart || !hasPostToolUse) process.exit(1);
            console.log('Hook entries: PASS');
          "

  publish:
    name: Release
    runs-on: ubuntu-latest
    needs: [archgate, test, hook-deployment]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - name: Version guard
        id: guard
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view graphwiki version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "Version $CURRENT already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $CURRENT (published: $PUBLISHED)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.guard.outputs.skip != 'true'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}